<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter - SereneWing</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../../../" class="site-logo">
                <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></span>
                <span>SereneWing</span>
            </a>
            <nav class="nav">
                <a href="../../games/" class="nav-link">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h4"></path><path d="M8 10v4"></path><circle cx="17" cy="10" r="1"></circle><circle cx="15" cy="13" r="1"></circle></svg></span>
                    <span>Games</span>
                </a>
                <a href="../../blog/" class="nav-link">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg></span>
                    <span>Blog</span>
                </a>
                <a href="../" class="nav-link active">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></span>
                    <span>Tools</span>
                </a>
                <a href="../../wiki/" class="nav-link">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></span>
                    <span>Wiki</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <header class="page-header">
                <h1 class="page-title">JSON Formatter</h1>
                <p class="page-description">Parse, validate, format and compress JSON data</p>
            </header>

            <div class="tool-container">
                <div class="tool-input">
                    <div class="tool-label">
                        <span>Input</span>
                        <button class="btn btn-sm" onclick="pasteFromClipboard()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>Paste</button>
                    </div>
                    <textarea 
                        id="jsonInput" 
                        class="form-textarea" 
                        placeholder="Paste JSON data here..."
                        oninput="formatJson()"
                    ></textarea>
                </div>

                <div class="tool-output">
                    <div class="tool-label">
                        <span>Output</span>
                        <button class="btn btn-sm" onclick="copyOutput()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>Copy</button>
                    </div>
                    <div id="jsonOutput" class="code-block" style="min-height: 300px; flex-grow: 1;">
                        <span class="text-muted">Formatted result will appear here...</span>
                    </div>
                </div>
            </div>

            <div class="tool-actions" style="margin-top: var(--space-xl);">
                <button class="btn btn-primary" onclick="formatJson()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Format</button>
                <button class="btn" onclick="minifyJson()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path></svg> Minify</button>
                <button class="btn" onclick="clearAll()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg> Clear</button>
                <button class="btn" onclick="toggleView()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> Toggle View</button>
            </div>

            <div id="errorMessage" class="mt-lg" style="display: none;">
                <div class="code-block" style="border-color: var(--color-danger-fg); background-color: #ffebe9;">
                    <span style="color: var(--color-danger-fg);">Error: </span>
                    <span id="errorText"></span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>
                <a href="../../../">SereneWing</a> · 
                Built by <a href="https://github.com/SereneWing" target="_blank">SereneWing</a>
            </p>
        </div>
    </footer>

    <script>
        let isFormatted = true;

        function formatJson() {
            const input = document.getElementById('jsonInput').value.trim();
            const output = document.getElementById('jsonOutput');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if (!input) {
                output.innerHTML = '<span class="text-muted">Formatted result will appear here...</span>';
                errorDiv.style.display = 'none';
                return;
            }

            try {
                const parsed = JSON.parse(input);
                const formatted = isFormatted 
                    ? JSON.stringify(parsed, null, 2)
                    : JSON.stringify(parsed);
                
                output.innerHTML = highlightJson(formatted);
                errorDiv.style.display = 'none';
            } catch (e) {
                output.innerHTML = '<span class="text-muted">Invalid JSON format</span>';
                errorText.textContent = e.message;
                errorDiv.style.display = 'block';
            }
        }

        function minifyJson() {
            isFormatted = false;
            formatJson();
            isFormatted = true;
        }

        function clearAll() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('jsonOutput').innerHTML = '<span class="text-muted">Formatted result will appear here...</span>';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function toggleView() {
            isFormatted = !isFormatted;
            formatJson();
        }

        function highlightJson(json) {
            return json
                .replace(/&/g, '&')
                .replace(/</g, '<')
                .replace(/>/g, '>')
                .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, function(match) {
                    let cls = 'json-string';
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                        match = match.slice(0, -1) + '<span>:';
                    } else {
                        match = '<span class="' + cls + '">' + match + '</span>';
                    }
                    return match;
                })
                .replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>')
                .replace(/\b(null)\b/g, '<span class="json-null">$1</span>')
                .replace(/\b(-?\d+\.?\d*)\b/g, '<span class="json-number">$1</span>');
        }

        async function copyOutput() {
            const output = document.getElementById('jsonOutput');
            const text = output.textContent;
            try {
                await navigator.clipboard.writeText(text);
                alert('Copied to clipboard!');
            } catch (e) {
                alert('Copy failed');
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('jsonInput').value = text;
                formatJson();
            } catch (e) {
                alert('Paste failed');
            }
        }
    </script>

    <style>
        .json-key { color: #0550ae; }
        .json-string { color: #0a3069; }
        .json-number { color: #0550ae; }
        .json-boolean { color: #cf222e; }
        .json-null { color: #cf222e; }
    </style>
</body>
</html>
