<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encoder/Decoder - SereneWing</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L9 6C8 7 7 8.5 7 10C7 12 8 14 10 15C8 13 7 10 8 7C9 4 11 3 12 3C13 3 15 4 16 7C17 10 16 13 14 15C16 14 17 12 17 10C17 8.5 16 7 15 6L12 2Z' fill='white' stroke='#999' stroke-width='0.5'/></svg>">
</head>
<body>
    <div class="component-header"></div>

    <main class="main">
        <div class="container">
            <header class="page-header">
                <h1 class="page-title">Encoder/Decoder</h1>
                <p class="page-description">Conversion tool for Base64, URL encoding and multiple encoding formats</p>
            </header>

            <div class="form-group">
                <label class="form-label">Encoding Type</label>
                <select id="encoderType" class="form-select" style="max-width: 300px;" onchange="processEncoding()">
                    <option value="base64">Base64</option>
                    <option value="url">URL Encoding</option>
                    <option value="html">HTML Entities</option>
                    <option value="unicode">Unicode Escape</option>
                </select>
            </div>

            <div class="tool-container">
                <div class="tool-input">
                    <div class="tool-label">
                        <span>Input</span>
                        <button class="btn btn-sm" onclick="pasteFromClipboard()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>Paste</button>
                    </div>
                    <textarea 
                        id="encoderInput" 
                        class="form-textarea" 
                        placeholder="Enter text to encode/decode here..."
                        oninput="processEncoding()"
                    ></textarea>
                </div>

                <div class="tool-output">
                    <div class="tool-label">
                        <span>Output</span>
                        <button class="btn btn-sm" onclick="copyOutput()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>Copy</button>
                    </div>
                    <textarea 
                        id="encoderOutput" 
                        class="form-textarea" 
                        style="min-height: 300px; flex-grow: 1; background-color: var(--color-canvas-inset);"
                        readonly
                    ></textarea>
                </div>
            </div>

            <div class="tool-actions" style="margin-top: var(--space-xl);">
                <button class="btn btn-primary" onclick="encode()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> Encode</button>
                <button class="btn btn-primary" onclick="decode()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg> Decode</button>
                <button class="btn" onclick="clearAll()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg> Clear</button>
                <button class="btn" onclick="swapInputOutput()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg> Swap</button>
            </div>

            <div id="errorMessage" class="mt-lg" style="display: none;">
                <div class="code-block" style="border-color: var(--color-danger-fg); background-color: #ffebe9;">
                    <span style="color: var(--color-danger-fg);">Error: </span>
                    <span id="errorText"></span>
                </div>
            </div>
        </div>
    </main>

    <footer class="component-footer"></footer>
    <script src="../../../js/components.js"></script>
    <script>SereneWing.initComponents('tools');</script>

    <script>
        function getEncoderType() {
            return document.getElementById('encoderType').value;
        }

        function encode() {
            const input = document.getElementById('encoderInput').value;
            const type = getEncoderType();
            const output = document.getElementById('encoderOutput');
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.display = 'none';

            try {
                switch (type) {
                    case 'base64':
                        output.value = btoa(unescape(encodeURIComponent(input)));
                        break;
                    case 'url':
                        output.value = encodeURIComponent(input);
                        break;
                    case 'html':
                        output.value = input
                            .replace(/&/g, '&')
                            .replace(/</g, '<')
                            .replace(/>/g, '>')
                            .replace(/"/g, '"')
                            .replace(/'/g, '&#039;');
                        break;
                    case 'unicode':
                        output.value = input.split('').map(c => 
                            c.charCodeAt(0) > 127 ? '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0') : c
                        ).join('');
                        break;
                }
            } catch (e) {
                document.getElementById('errorText').textContent = e.message;
                errorDiv.style.display = 'block';
            }
        }

        function decode() {
            const input = document.getElementById('encoderInput').value;
            const type = getEncoderType();
            const output = document.getElementById('encoderOutput');
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.display = 'none';

            try {
                switch (type) {
                    case 'base64':
                        output.value = decodeURIComponent(escape(atob(input)));
                        break;
                    case 'url':
                        output.value = decodeURIComponent(input);
                        break;
                    case 'html':
                        output.value = input
                            .replace(/&/g, '&')
                            .replace(/</g, '<')
                            .replace(/>/g, '>')
                            .replace(/"/g, '"')
                            .replace(/&#039;/g, "'");
                        break;
                    case 'unicode':
                        output.value = input.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => 
                            String.fromCharCode(parseInt(hex, 16))
                        );
                        break;
                }
            } catch (e) {
                document.getElementById('errorText').textContent = e.message;
                errorDiv.style.display = 'block';
            }
        }

        function processEncoding() {
            // Auto-encode on input change (optional)
        }

        function clearAll() {
            document.getElementById('encoderInput').value = '';
            document.getElementById('encoderOutput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function swapInputOutput() {
            const input = document.getElementById('encoderInput');
            const output = document.getElementById('encoderOutput');
            const temp = input.value;
            input.value = output.value;
            output.value = temp;
        }

        async function copyOutput() {
            const output = document.getElementById('encoderOutput');
            try {
                await navigator.clipboard.writeText(output.value);
                alert('Copied to clipboard!');
            } catch (e) {
                alert('Copy failed');
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('encoderInput').value = text;
            } catch (e) {
                alert('Paste failed');
            }
        }
    </script>
</body>
</html>
