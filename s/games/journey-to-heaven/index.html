<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西游记 - 大闹天宫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #2a2a6e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 900px;
            height: 700px;
            background: linear-gradient(180deg, #1a0a3e 0%, #2a1a5e 30%, #3a2a7e 60%, #4a3a8e 100%);
            border: 5px solid #FFD700;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5), inset 0 0 100px rgba(100, 100, 255, 0.1);
        }
        /* Star background */
        .bg-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        /* Mist effect */
        .mist {
            position: absolute;
            background: radial-gradient(ellipse, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        /* Road - White stone path */
        .road {
            position: absolute;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #f0f0f0 100%);
            border: 3px solid #ccc;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        .road::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(90deg, transparent 0px, transparent 15px, #ddd 15px, #ddd 20px);
        }
        /* Heavenly Palace */
        #tiangong {
            position: absolute;
            width: 150px;
            height: 130px;
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            border: 4px solid #8B4513;
            border-radius: 15px 15px 5px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.5);
            z-index: 30;
        }
        #tiangong::before {
            content: '🏯';
            font-size: 50px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        #tiangong::after {
            content: '天宫';
            color: #8B4513;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #FFD700;
        }
        /* Palace decoration */
        .palace-decor {
            position: absolute;
            font-size: 24px;
            z-index: 31;
        }
        /* Character base style */
        .character {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            z-index: 10;
        }
        .character-icon {
            font-size: 42px;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.5));
            transition: transform 0.2s;
        }
        .character-label {
            font-size: 14px;
            color: #fff;
            background: linear-gradient(180deg, #333 0%, #111 100%);
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 4px;
            border: 2px solid #FFD700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        /* Sun Wukong */
        #wukong {
            z-index: 15;
            animation: wukongBounce 0.4s ease-in-out infinite;
        }
        @keyframes wukongBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }
        /* Li Tianwang */
        #litianwang {
            cursor: pointer;
            transition: transform 0.3s;
        }
        #litianwang:hover {
            transform: scale(1.1);
        }
        #litianwang:hover .character-icon {
            transform: rotate(15deg);
        }
        /* Nezha */
        #nezha {
            cursor: pointer;
            transition: transform 0.3s;
        }
        #nezha:hover {
            transform: scale(1.1);
        }
        /* Tower attack */
        .tower {
            position: absolute;
            font-size: 36px;
            z-index: 25;
            pointer-events: none;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }
        /* Nezha flying */
        #nezhaFlying {
            position: absolute;
            font-size: 42px;
            z-index: 25;
            display: none;
            pointer-events: none;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }
        /* Start button */
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 50px;
            font-size: 24px;
            background: linear-gradient(180deg, #FF6B35 0%, #E55A2B 100%);
            color: white;
            border: 4px solid #FFD700;
            border-radius: 15px;
            cursor: pointer;
            z-index: 100;
            font-family: 'Microsoft YaHei', sans-serif;
            box-shadow: 0 5px 20px rgba(255,107,53,0.5), 0 0 30px rgba(255,215,0,0.3);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        #startBtn:hover {
            background: linear-gradient(180deg, #FF8555 0%, #FF6B35 100%);
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 8px 30px rgba(255,107,53,0.7), 0 0 40px rgba(255,215,0,0.5);
        }
        /* Game message */
        #gameMsg {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 25px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%);
            color: #FFD700;
            border-radius: 25px;
            font-size: 16px;
            z-index: 50;
            border: 2px solid #FFD700;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
        }
        /* Info panel */
        #infoPanel {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%);
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            z-index: 50;
            border: 2px solid #FFD700;
        }
        /* Restart button */
        #restartBtn {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(180deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: 3px solid #FFD700;
            border-radius: 12px;
            cursor: pointer;
            z-index: 100;
            font-family: 'Microsoft YaHei', sans-serif;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #restartBtn:hover {
            background: linear-gradient(180deg, #66BB6A 0%, #4CAF50 100%);
        }
        /* Music control */
        #musicBtn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            padding: 10px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%);
            color: #FFD700;
            border: 2px solid #FFD700;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 50;
            transition: all 0.3s;
        }
        #musicBtn:hover {
            background: linear-gradient(180deg, rgba(50,50,0,0.8) 0%, rgba(30,30,0,0.9) 100%);
            transform: scale(1.05);
        }
        /* Effect hint */
        .effect-hint {
            position: absolute;
            font-size: 20px;
            color: #FFD700;
            font-weight: bold;
            z-index: 60;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        /* Hit effect */
        .hit-effect {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b6b 0%, transparent 70%);
            animation: explode 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 40;
        }
        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Game message -->
        <div id="gameMsg">🎮 Click Li Tianwang to shoot tower, Nezha can fly to attack</div>

        <!-- Info panel -->
        <div id="infoPanel">
            <div>Steps: <span id="stepCount">0</span></div>
        </div>

        <!-- Star background container -->
        <div id="starContainer"></div>

        <!-- Mist container -->
        <div id="mistContainer"></div>

        <!-- Road container -->
        <div id="roadSegments"></div>

        <!-- Heavenly Palace -->
        <div id="tiangong"></div>
        <div class="palace-decor" style="top:15px;left:770px;">✨</div>
        <div class="palace-decor" style="top:35px;left:800px;">✨</div>

        <!-- Li Tianwang -->
        <div id="litianwang" class="character" onclick="JourneyToHeaven.shootTower()">
            <div class="character-icon">👨‍🦱</div>
            <div class="character-label">Li Tianwang</div>
        </div>

        <!-- Nezha -->
        <div id="nezha" class="character" onclick="JourneyToHeaven.nezhaAttack()">
            <div class="character-icon">🦁</div>
            <div class="character-label">Nezha</div>
        </div>

        <!-- Sun Wukong -->
        <div id="wukong" class="character">
            <div class="character-icon">🐵</div>
            <div class="character-label">Sun Wukong</div>
        </div>

        <!-- Nezha flying state -->
        <div id="nezhaFlying">🦁</div>

        <!-- Start button -->
        <button id="startBtn" onclick="JourneyToHeaven.startGame()">🎮 Start Game</button>

        <!-- Restart button -->
        <button id="restartBtn" onclick="JourneyToHeaven.restartGame()">🔄 Play Again</button>

        <!-- Music control -->
        <button id="musicBtn" onclick="JourneyToHeaven.toggleMusic()">🔇 Music</button>
    </div>

    <!-- 大闹天宫背景音乐 -->
    <script src="music.js"></script>

    <script>
    (function() {
        'use strict';

        // ==================== Constants ====================
        const CONFIG = {
            containerWidth: 900,
            containerHeight: 700,
            roadWidth: 60,
            wukongSpeed: 2.5,
            towerSpeed: 10,
            nezhaSpeed: 6,

            // Character positions (unified)
            liTianwang: { x: 150, y: 420 },
            nezha: { x: 600, y: 550 },
            wukongStart: { x: 30, y: 620 },

            // Attack positions
            towerStart: { x: 190, y: 450 },
            nezhaStart: { x: 630, y: 580 },
            nezhaTargetY: 100,

            // Collision radii
            towerCollisionRadius: 35,
            nezhaCollisionRadius: 40,
            wukongCollisionOffset: 20,

            // Distances
            winDistance: 70,
            towerMaxDistance: 550,

            // Animation
            blinkCount: 8,
            blinkInterval: 150,
            stepCountInterval: 30,

            // Visual
            starCount: 9,
            mistCount: 2,

            // Palace
            palace: { x: 720, y: 20 },
            palaceWinCenter: { x: 795, y: 85 }
        };

        // ==================== Game Object ====================
        window.JourneyToHeaven = {
            // Game state
            state: {
                isRunning: false,
                wukongPathIndex: 0,
                wukongProgress: 0,
                stepCount: 0,
                wukongPos: { x: 30, y: 620 },
                towerFlying: false,
                nezhaFlying: false
            },

            // Animation tracking
            animationId: null,
            towerAnimationId: null,
            nezhaAnimationId: null,

            // Music state
            isMusicPlaying: false,

            // Road path
            roadPath: [
                { x: 0, y: 650 },
                { x: 250, y: 650 },
                { x: 250, y: 480 },
                { x: 500, y: 480 },
                { x: 500, y: 300 },
                { x: 700, y: 300 },
                { x: 700, y: 150 },
                { x: 780, y: 150 }
            ],

            // ==================== Music (大闹天宫背景音乐) ====================
            musicPlayer: null,

            toggleMusic() {
                const btn = document.getElementById('musicBtn');

                if (this.isMusicPlaying) {
                    if (this.musicPlayer) {
                        this.musicPlayer.stop();
                    }
                    btn.textContent = '🔇 Music';
                    this.isMusicPlaying = false;
                } else {
                    // 使用新的音乐模块播放完整60秒音乐
                    this.musicPlayer = new HeavenlyPalaceMusic();
                    this.musicPlayer.play();
                    btn.textContent = '🔊 Music';
                    this.isMusicPlaying = true;
                }
            },

            // ==================== Initialization ====================
            createStars() {
                const container = document.getElementById('starContainer');
                container.innerHTML = '';

                const positions = [
                    { left: 50, top: 30, size: 3, delay: 0 },
                    { left: 150, top: 60, size: 2, delay: 0.5 },
                    { left: 300, top: 100, size: 4, delay: 1 },
                    { left: 450, top: 80, size: 2, delay: 1.5 },
                    { left: 550, top: 120, size: 3, delay: 0.3 },
                    { left: 700, top: 50, size: 2, delay: 0.8 },
                    { left: 100, top: 200, size: 3, delay: 1.2 },
                    { left: 350, top: 250, size: 2, delay: 0.7 },
                    { left: 500, top: 300, size: 4, delay: 1.8 }
                ];

                positions.forEach(pos => {
                    const star = document.createElement('div');
                    star.className = 'bg-star';
                    star.style.width = pos.size + 'px';
                    star.style.height = pos.size + 'px';
                    star.style.left = pos.left + 'px';
                    star.style.top = pos.top + 'px';
                    star.style.animationDelay = pos.delay + 's';
                    container.appendChild(star);
                });
            },

            createMists() {
                const container = document.getElementById('mistContainer');
                container.innerHTML = '';

                const mists = [
                    { left: 50, top: 150, width: 150, height: 80, opacity: 0.3 },
                    { left: 400, top: 300, width: 120, height: 60, opacity: 0.2 }
                ];

                mists.forEach(mist => {
                    const el = document.createElement('div');
                    el.className = 'mist';
                    el.style.left = mist.left + 'px';
                    el.style.top = mist.top + 'px';
                    el.style.width = mist.width + 'px';
                    el.style.height = mist.height + 'px';
                    el.style.opacity = mist.opacity;
                    container.appendChild(el);
                });
            },

            initRoad() {
                const segmentsContainer = document.getElementById('roadSegments');
                segmentsContainer.innerHTML = '';

                for (let i = 0; i < this.roadPath.length - 1; i++) {
                    const start = this.roadPath[i];
                    const end = this.roadPath[i + 1];

                    const segment = document.createElement('div');
                    segment.className = 'road';

                    if (start.x === end.x) {
                        const top = Math.min(start.y, end.y);
                        const height = Math.abs(end.y - start.y);
                        segment.style.left = (start.x - CONFIG.roadWidth / 2) + 'px';
                        segment.style.top = top + 'px';
                        segment.style.width = CONFIG.roadWidth + 'px';
                        segment.style.height = height + 'px';
                        segment.style.background = 'linear-gradient(90deg, #e8e8e8 0%, #f5f5f5 50%, #e8e8e8 100%)';
                    } else {
                        const left = Math.min(start.x, end.x);
                        const width = Math.abs(end.x - start.x);
                        segment.style.left = left + 'px';
                        segment.style.top = (start.y - CONFIG.roadWidth / 2) + 'px';
                        segment.style.width = width + 'px';
                        segment.style.height = CONFIG.roadWidth + 'px';
                    }

                    segmentsContainer.appendChild(segment);
                }

                // Position Heavenly Palace
                const tiangong = document.getElementById('tiangong');
                tiangong.style.left = CONFIG.palace.x + 'px';
                tiangong.style.top = CONFIG.palace.y + 'px';

                // Position Li Tianwang
                const litianwang = document.getElementById('litianwang');
                litianwang.style.left = CONFIG.liTianwang.x + 'px';
                litianwang.style.top = CONFIG.liTianwang.y + 'px';

                // Position Nezha
                const nezha = document.getElementById('nezha');
                nezha.style.left = CONFIG.nezha.x + 'px';
                nezha.style.top = CONFIG.nezha.y + 'px';
            },

            init() {
                this.createStars();
                this.createMists();
                this.initRoad();
            },

            // ==================== Game Flow ====================
            startGame() {
                document.getElementById('startBtn').style.display = 'none';
                this.state.isRunning = true;
                this.state.wukongPathIndex = 0;
                this.state.wukongProgress = 0;
                this.state.stepCount = 0;
                document.getElementById('stepCount').textContent = '0';

                this.resetWukong();
                this.gameLoop();
            },

            resetWukong() {
                this.state.wukongPathIndex = 0;
                this.state.wukongProgress = 0;
                const wukong = document.getElementById('wukong');
                wukong.style.left = CONFIG.wukongStart.x + 'px';
                wukong.style.top = CONFIG.wukongStart.y + 'px';
                wukong.style.opacity = '1';
                this.state.wukongPos = { ...CONFIG.wukongStart };
            },

            gameLoop() {
                if (!this.state.isRunning) return;

                this.moveWukong();
                this.animationId = requestAnimationFrame(() => this.gameLoop());
            },

            // ==================== Movement ====================
            hasReachedDestination() {
                return this.state.wukongPathIndex >= this.roadPath.length - 1;
            },

            moveWukong() {
                if (this.hasReachedDestination()) {
                    this.winGame();
                    return;
                }

                const currentPoint = this.roadPath[this.state.wukongPathIndex];
                const nextPoint = this.roadPath[this.state.wukongPathIndex + 1];

                const dx = nextPoint.x - currentPoint.x;
                const dy = nextPoint.y - currentPoint.y;
                const segmentLength = Math.sqrt(dx * dx + dy * dy);

                this.state.wukongProgress += CONFIG.wukongSpeed;

                if (this.state.wukongProgress >= segmentLength) {
                    this.state.wukongProgress = 0;
                    this.state.wukongPathIndex++;

                    if (this.hasReachedDestination()) {
                        this.winGame();
                        return;
                    }
                }

                const ratio = this.state.wukongProgress / segmentLength;
                const newX = currentPoint.x + dx * ratio - CONFIG.wukongCollisionOffset;
                const newY = currentPoint.y + dy * ratio - CONFIG.wukongCollisionOffset;

                this.state.wukongPos.x = newX;
                this.state.wukongPos.y = newY;

                const wukong = document.getElementById('wukong');
                wukong.style.left = newX + 'px';
                wukong.style.top = newY + 'px';

                this.state.stepCount++;
                if (this.state.stepCount % CONFIG.stepCountInterval === 0) {
                    document.getElementById('stepCount').textContent = Math.floor(this.state.stepCount / CONFIG.stepCountInterval);
                }

                this.checkWinCondition(newX, newY);
            },

            checkWinCondition(x, y) {
                const palace = CONFIG.palaceWinCenter;
                const distance = Math.sqrt(
                    Math.pow(x - palace.x, 2) + Math.pow(y - palace.y, 2)
                );

                if (distance < CONFIG.winDistance) {
                    this.winGame();
                }
            },

            // ==================== Win/Lose ====================
            winGame() {
                this.state.isRunning = false;
                this.stopAllAnimations();

                const msg = document.getElementById('gameMsg');
                msg.textContent = '🎉 Congratulations! Storming the Heavenly Palace Success!';
                msg.style.color = '#00ff00';

                this.showEffect(document.getElementById('wukong'), '🎊');

                document.getElementById('restartBtn').style.display = 'block';
            },

            wukongHit() {
                const msg = document.getElementById('gameMsg');
                msg.textContent = '💥 Sun Wukong hit! Restarting...';
                msg.style.color = '#ff6b6b';

                this.stopAllAnimations();

                const wukong = document.getElementById('wukong');
                let blinkCount = 0;

                const blink = () => {
                    blinkCount++;
                    wukong.style.opacity = blinkCount % 2 === 0 ? '1' : '0.3';

                    if (blinkCount < CONFIG.blinkCount) {
                        setTimeout(blink, CONFIG.blinkInterval);
                    } else {
                        this.resetWukong();
                        msg.textContent = '🎮 Click Li Tianwang to shoot tower, Nezha can fly to attack';
                        msg.style.color = '#FFD700';
                        this.gameLoop();
                    }
                };

                blink();
            },

            restartGame() {
                document.getElementById('restartBtn').style.display = 'none';

                const msg = document.getElementById('gameMsg');
                msg.textContent = '🎮 Click Li Tianwang to shoot tower, Nezha can fly to attack';
                msg.style.color = '#FFD700';

                this.state.wukongPathIndex = 0;
                this.state.wukongProgress = 0;
                this.state.stepCount = 0;
                this.state.towerFlying = false;
                this.state.nezhaFlying = false;
                document.getElementById('stepCount').textContent = '0';

                this.resetWukong();
                this.state.isRunning = true;
                this.gameLoop();
            },

            // ==================== Animation Management ====================
            stopAllAnimations() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                if (this.towerAnimationId) {
                    cancelAnimationFrame(this.towerAnimationId);
                    this.towerAnimationId = null;
                }
                if (this.nezhaAnimationId) {
                    cancelAnimationFrame(this.nezhaAnimationId);
                    this.nezhaAnimationId = null;
                }
            },

            // ==================== Effects ====================
            showEffect(element, text) {
                const rect = element.getBoundingClientRect();
                const container = document.getElementById('gameContainer');
                const containerRect = container.getBoundingClientRect();

                const effect = document.createElement('div');
                effect.className = 'effect-hint';
                effect.textContent = text;
                effect.style.left = (rect.left - containerRect.left + rect.width / 2 - 20) + 'px';
                effect.style.top = (rect.top - containerRect.top - 20) + 'px';
                container.appendChild(effect);

                setTimeout(() => effect.remove(), 1000);
            },

            showHitEffect(x, y) {
                const container = document.getElementById('gameContainer');
                const effect = document.createElement('div');
                effect.className = 'hit-effect';
                effect.style.left = (x - 30) + 'px';
                effect.style.top = (y - 30) + 'px';
                container.appendChild(effect);

                setTimeout(() => effect.remove(), 500);
            },

            // ==================== Attacks ====================
            shootTower() {
                if (!this.state.isRunning || this.state.towerFlying) return;

                const container = document.getElementById('gameContainer');
                const tower = document.createElement('div');
                tower.className = 'tower';
                tower.textContent = '🗼';
                tower.style.left = CONFIG.towerStart.x + 'px';
                tower.style.top = CONFIG.towerStart.y + 'px';
                container.appendChild(tower);

                this.state.towerFlying = true;
                this.showEffect(document.getElementById('litianwang'), 'Shoot!');

                let towerX = CONFIG.towerStart.x;
                let towerY = CONFIG.towerStart.y;

                const animateTower = () => {
                    towerX += CONFIG.towerSpeed;
                    tower.style.left = towerX + 'px';

                    // Check collision
                    const wukongX = this.state.wukongPos.x + CONFIG.wukongCollisionOffset;
                    const wukongY = this.state.wukongPos.y + CONFIG.wukongCollisionOffset;
                    const towerDist = Math.sqrt(
                        Math.pow(towerX - wukongX, 2) +
                        Math.pow(towerY - wukongY, 2)
                    );

                    if (towerDist < CONFIG.towerCollisionRadius) {
                        tower.remove();
                        this.state.towerFlying = false;
                        this.showHitEffect(wukongX, wukongY);
                        this.wukongHit();
                        return;
                    }

                    // Return at road end
                    if (towerX > CONFIG.towerStart.x + CONFIG.towerMaxDistance) {
                        const returnDuration = 300;
                        const startTime = performance.now();

                        const returnAnimate = (currentTime) => {
                            const elapsed = currentTime - startTime;
                            const progress = Math.min(elapsed / returnDuration, 1);
                            const scale = 1 - progress;
                            const opacity = 1 - progress;

                            tower.style.transform = `scale(${scale})`;
                            tower.style.opacity = opacity;

                            if (progress < 1) {
                                this.towerAnimationId = requestAnimationFrame(returnAnimate);
                            } else {
                                tower.remove();
                                this.state.towerFlying = false;
                            }
                        };

                        this.towerAnimationId = requestAnimationFrame(returnAnimate);
                        return;
                    }

                    this.towerAnimationId = requestAnimationFrame(animateTower);
                };

                this.towerAnimationId = requestAnimationFrame(animateTower);
            },

            nezhaAttack() {
                if (!this.state.isRunning || this.state.nezhaFlying) return;

                const nezhaFlyingEl = document.getElementById('nezhaFlying');
                const nezhaEl = document.getElementById('nezha');

                nezhaFlyingEl.style.left = CONFIG.nezhaStart.x + 'px';
                nezhaFlyingEl.style.top = CONFIG.nezhaStart.y + 'px';
                nezhaFlyingEl.style.display = 'block';
                nezhaEl.style.opacity = '0.3';

                this.state.nezhaFlying = true;
                this.showEffect(nezhaEl, 'Take off!');

                let currentX = CONFIG.nezhaStart.x;
                let currentY = CONFIG.nezhaStart.y;
                let phase = 'up';

                const animateNezha = () => {
                    if (phase === 'up') {
                        currentY -= CONFIG.nezhaSpeed;
                        nezhaFlyingEl.style.top = currentY + 'px';

                        // Check collision
                        const wukongX = this.state.wukongPos.x + CONFIG.wukongCollisionOffset;
                        const wukongY = this.state.wukongPos.y + CONFIG.wukongCollisionOffset;
                        const dist = Math.sqrt(
                            Math.pow(currentX - wukongX, 2) +
                            Math.pow(currentY - wukongY, 2)
                        );

                        if (dist < CONFIG.nezhaCollisionRadius) {
                            nezhaFlyingEl.style.display = 'none';
                            nezhaEl.style.opacity = '1';
                            this.state.nezhaFlying = false;
                            this.showHitEffect(wukongX, wukongY);
                            this.wukongHit();
                            return;
                        }

                        if (currentY <= CONFIG.nezhaTargetY) {
                            phase = 'back';
                        }

                        this.nezhaAnimationId = requestAnimationFrame(animateNezha);
                    } else {
                        // Return to original position
                        const dx = CONFIG.nezhaStart.x - currentX;
                        const dy = CONFIG.nezhaStart.y - currentY;
                        const distToHome = Math.sqrt(dx * dx + dy * dy);

                        if (distToHome < CONFIG.nezhaSpeed) {
                            nezhaFlyingEl.style.display = 'none';
                            nezhaEl.style.opacity = '1';
                            this.state.nezhaFlying = false;
                            return;
                        }

                        currentX += dx * CONFIG.nezhaSpeed / distToHome;
                        currentY += dy * CONFIG.nezhaSpeed / distToHome;
                        nezhaFlyingEl.style.left = currentX + 'px';
                        nezhaFlyingEl.style.top = currentY + 'px';

                        this.nezhaAnimationId = requestAnimationFrame(animateNezha);
                    }
                };

                this.nezhaAnimationId = requestAnimationFrame(animateNezha);
            }
        };

        // Initialize on page load
        window.onload = function() {
            JourneyToHeaven.init();
        };
    })();
    </script>
