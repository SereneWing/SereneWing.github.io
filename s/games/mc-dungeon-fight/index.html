<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方块战士 - 我的世界地下城风格</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; width: 900px; height: 650px; background: repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(0,0,0,0.05) 30px, rgba(0,0,0,0.05) 32px), repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0,0,0,0.05) 30px, rgba(0,0,0,0.05) 32px), linear-gradient(180deg, #5D8B37 0%, #4A7B2D 20%, #3D6B25 40%, #8B5A2B 60%, #7A4A1B 80%, #6A3A0B 100%); border: 8px solid #8B4513; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.3), 0 0 30px rgba(0,0,0,0.5); cursor: crosshair; }
        .grass-tuft { position: absolute; font-size: 14px; color: #2D6B1D; pointer-events: none; }
        #title { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #FFD700; font-size: 28px; font-weight: bold; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000; z-index: 100; font-family: 'Courier New', monospace; }
        #scoreBoard { position: absolute; top: 10px; right: 15px; background: rgba(139, 69, 19, 0.9); border: 4px solid #5D3A1A; padding: 8px 15px; color: #FFD700; font-size: 20px; font-weight: bold; z-index: 100; font-family: 'Courier New', monospace; }
        #player { position: absolute; width: 50px; height: 70px; z-index: 50; }
        .player-body { position: relative; width: 100%; height: 100%; }
        .player-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 36px; height: 32px; background: linear-gradient(135deg, #DEB887 0%, #D2B48C 50%, #C4A882 100%); border: 3px solid #8B7355; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; }
        .player-eye { width: 6px; height: 6px; background: #333; margin: 2px; }
        .player-hat { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 42px; height: 12px; background: linear-gradient(180deg, #FFD700 0%, #DAA520 100%); border: 2px solid #B8860B; }
        .player-hat::after { content: '⭕'; position: absolute; top: -8px; right: -10px; font-size: 14px; }
        .player-torso { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 32px; height: 24px; background: linear-gradient(180deg, #8B0000 0%, #DC143C 50%, #8B0000 100%); border: 3px solid #5C0000; }
        .player-legs { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); width: 30px; height: 18px; display: flex; justify-content: space-between; }
        .player-leg { width: 12px; height: 18px; background: linear-gradient(180deg, #8B4513 0%, #654321 100%); border: 2px solid #4A3010; }
        .walking .player-leg.left { animation: walkLeft 0.3s ease-in-out infinite; }
        .walking .player-leg.right { animation: walkRight 0.3s ease-in-out infinite; }
        @keyframes walkLeft { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-5px) rotate(5deg); } }
        @keyframes walkRight { 0%, 100% { transform: translateY(-5px) rotate(5deg); } 50% { transform: translateY(0) rotate(-5deg); } }
        .player-staff { position: absolute; right: -8px; top: 15px; width: 8px; height: 50px; background: linear-gradient(90deg, #FFD700 0%, #FFA500 50%, #FFD700 100%); border-radius: 2px; transform-origin: bottom center; box-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }
        .attacking .player-staff { animation: attackSwing 0.3s ease-in-out infinite; }
        @keyframes attackSwing { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-45deg); } 75% { transform: rotate(45deg); } }
        .monster { position: absolute; cursor: pointer; z-index: 40; }
        .monster-body { position: relative; width: 100%; height: 100%; }
        .zombie .monster-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 36px; height: 32px; background: linear-gradient(135deg, #00AA00 0%, #008800 50%, #006600 100%); border: 3px solid #004400; display: flex; justify-content: center; align-items: center; }
        .zombie .monster-eyes { display: flex; gap: 8px; }
        .zombie .monster-eye { width: 8px; height: 8px; background: #FF0000; }
        .zombie .monster-mouth { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 16px; height: 6px; background: #003300; display: flex; gap: 2px; }
        .zombie .monster-teeth { width: 4px; height: 4px; background: #FFFFFF; margin-top: -2px; }
        .zombie .monster-torso { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 30px; height: 20px; background: linear-gradient(180deg, #00AA00 0%, #008800 100%); border: 2px solid #004400; }
        .zombie .monster-arms { position: absolute; top: 32px; width: 100%; }
        .zombie .monster-arm { position: absolute; width: 10px; height: 18px; background: #00AA00; border: 2px solid #004400; }
        .zombie .monster-arm.left { left: -5px; transform: rotate(15deg); }
        .zombie .monster-arm.right { right: -5px; transform: rotate(-15deg); }
        .zombie .monster-legs { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); width: 28px; display: flex; justify-content: space-between; }
        .zombie .monster-leg { width: 11px; height: 10px; background: #006600; border: 2px solid #004400; }
        .skeleton .monster-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 36px; height: 32px; background: linear-gradient(135deg, #DDDDDD 0%, #CCCCCC 50%, #AAAAAA 100%); border: 3px solid #666666; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .skeleton .monster-eyes { display: flex; gap: 10px; margin-bottom: 4px; }
        .skeleton .monster-eye { width: 8px; height: 8px; background: #000000; }
        .skeleton .monster-nose { width: 6px; height: 4px; background: #666666; }
        .skeleton .monster-mouth { position: absolute; bottom: 2px; width: 18px; height: 8px; background: #000000; display: flex; justify-content: center; gap: 2px; padding-top: 2px; }
        .skeleton .monster-teeth { width: 3px; height: 5px; background: #FFFFFF; }
        .skeleton .monster-torso { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 28px; height: 20px; background: linear-gradient(180deg, transparent 0%, transparent 50%, #666666 50%, #666666 100%); border: 2px solid #666666; }
        .skeleton .monster-ribs { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 20px; height: 12px; background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, #666666 2px, #666666 4px); }
        .skeleton .monster-legs { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); width: 26px; display: flex; justify-content: space-between; }
        .skeleton .monster-leg { width: 10px; height: 10px; background: #AAAAAA; border: 2px solid #666666; }
        .monster.hurt { animation: hurtFlash 0.15s ease-in-out 2; }
        @keyframes hurtFlash { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(3) hue-rotate(30deg); } }
        .monster.dying { animation: die 0.5s ease-out forwards; }
        @keyframes die { 0% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(0) rotate(45deg); opacity: 0; } }
        .hit-effect { position: absolute; font-size: 24px; pointer-events: none; animation: hitPop 0.4s ease-out forwards; z-index: 200; }
        @keyframes hitPop { 0% { transform: scale(0.5); opacity: 1; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(0.8) translateY(-20px); opacity: 0; } }
        .score-popup { position: absolute; color: #FFD700; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none; animation: scoreFloat 1s ease-out forwards; z-index: 200; font-family: 'Courier New', monospace; }
        @keyframes scoreFloat { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.2) translateY(-50px); opacity: 0; } }
        #hint { position: absolute; bottom: 15px; left: 15px; padding: 8px 12px; background: rgba(0, 0, 0, 0.8); color: #CCCCCC; border: 3px solid #666; font-size: 13px; z-index: 100; font-family: 'Courier New', monospace; }
        .health-bar { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 40px; height: 6px; background: #333; border: 2px solid #000; }
        .health-fill { height: 100%; background: #FF3333; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="title">⚔️ 方块战士 ⚔️</div>
        <div id="scoreBoard">💀 击杀: <span id="score">0</span></div>
        <div id="player"><div class="player-body"><div class="player-hat"></div><div class="player-head"><div class="player-eye"></div><div class="player-eye"></div></div><div class="player-torso"></div><div class="player-legs"><div class="player-leg left"></div><div class="player-leg right"></div></div><div class="player-staff"></div></div></div>
        <div id="hint">🎯 点击移动 | ⚔️ 点击怪物攻击 | 🎵 点击任意处播放音乐</div>
        <audio id="bgMusic" loop preload="auto"></audio>
    </div>
    
    <script>
        const config = { containerWidth: 900, containerHeight: 650, playerSpeed: 2, monsterSpeed: 0.6, attackRange: 60, attackInterval: 300, monsterHP: 3, spawnInterval: 3000, maxMonsters: 6, initialMonsters: 2 };
        const state = { playerX: 450, playerY: 325, targetX: 450, targetY: 325, isMoving: false, isAttacking: false, currentTarget: null, score: 0, monsters: [], audioCtx: null, bgMusicSrc: null };
        const player = document.getElementById('player'), container = document.getElementById('gameContainer'), scoreEl = document.getElementById('score'), bgMusic = document.getElementById('bgMusic');
        
        // Generate Minecraft-style background music using Web Audio API
        function generateBgMusic() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return null;
            
            try {
                const audioCtx = new AudioContext();
                const sampleRate = audioCtx.sampleRate;
                const duration = 8; // 8 second loop
                const buffer = audioCtx.createBuffer(2, sampleRate * duration, sampleRate);
                
                // Pentatonic scale (Chinese style)
                const notes = [262, 294, 330, 392, 440, 523, 587, 659]; // C4, D4, E4, G4, A4, C5, D5, E5
                const melody = [0, 2, 4, 5, 4, 2, 0, 2, 4, 5, 7, 5, 4, 2, 4, 0, 2, 4, 5, 7, 5, 4, 2, 0, 4, 2, 0, 2, 4, 5, 4, 2];
                const beatDuration = (sampleRate * duration) / melody.length;
                
                for (let channel = 0; channel < 2; channel++) {
                    const data = buffer.getChannelData(channel);
                    
                    // Melody
                    melody.forEach((noteIndex, i) => {
                        const freq = notes[noteIndex] * (channel === 1 ? 0.5 : 1);
                        const start = Math.floor(i * beatDuration);
                        const end = Math.floor(start + beatDuration * 0.8);
                        
                        for (let j = start; j < end && j < data.length; j++) {
                            const t = (j - start) / sampleRate;
                            const envelope = Math.min(1, (end - j) / (sampleRate * 0.05));
                            // Square wave for 8-bit sound
                            const squareWave = Math.sign(Math.sin(2 * Math.PI * freq * t)) * 0.25;
                            const sine = Math.sin(2 * Math.PI * freq * t) * 0.15;
                            data[j] += (squareWave + sine) * envelope * (channel === 0 ? 0.5 : 0.3);
                        }
                    });
                    
                    // Bass drum
                    for (let i = 0; i < 16; i++) {
                        const start = Math.floor(i * beatDuration * 2);
                        for (let j = start; j < start + sampleRate * 0.05 && j < data.length; j++) {
                            const t = (j - start) / sampleRate;
                            data[j] += Math.sin(2 * Math.PI * 80 * t) * Math.exp(-t * 40) * 0.5;
                        }
                    }
                }
                
                // Convert to WAV
                const wavBlob = audioBufferToWav(buffer);
                return URL.createObjectURL(wavBlob);
            } catch (e) {
                console.error('Failed to generate music:', e);
                return null;
            }
        }
        
        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            
            const samples = buffer.length;
            const dataSize = samples * blockAlign;
            const bufferSize = 44 + dataSize;
            
            const arrayBuffer = new ArrayBuffer(bufferSize);
            const view = new DataView(arrayBuffer);
            
            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            // fmt chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            // data chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);
            
            // Interleave channels and write samples
            const channels = [];
            for (let i = 0; i < numChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }
            
            let offset = 44;
            for (let i = 0; i < samples; i++) {
                for (let ch = 0; ch < numChannels; ch++) {
                    const sample = Math.max(-1, Math.min(1, channels[ch][i]));
                    const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, intSample, true);
                    offset += 2;
                }
            }
            
            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }
        
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        
        function playHitSound() {
            if (!state.audioCtx) return;
            try {
                const ctx = state.audioCtx;
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.frequency.setValueAtTime(150, ctx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                
                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + 0.12);
                
                // Add crunch
                const noise = ctx.createOscillator();
                const noiseGain = ctx.createGain();
                noise.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.frequency.setValueAtTime(800, ctx.currentTime);
                noise.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.05);
                noiseGain.gain.setValueAtTime(0.2, ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                noise.start(ctx.currentTime);
                noise.stop(ctx.currentTime + 0.05);
            } catch (e) { /* Ignore audio errors */ }
        }
        
        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                try {
                    state.audioCtx = new AudioContext();
                } catch (e) { /* Ignore */ }
            }
            
            // Generate and set up music
            const musicSrc = generateBgMusic();
            if (musicSrc) {
                state.bgMusicSrc = musicSrc;
                bgMusic.src = musicSrc;
            }
        }
        
        function startMusic() {
            if (state.audioCtx && state.audioCtx.state === 'suspended') {
                state.audioCtx.resume();
            }
            bgMusic.play().catch(e => console.log('Music autoplay prevented'));
        }
        
        function createMonster() {
            if (state.monsters.length >= config.maxMonsters) return;
            const type = Math.random() > 0.5 ? 'zombie' : 'skeleton';
            const monster = document.createElement('div');
            monster.className = `monster ${type}`;
            monster.style.width = '45px'; monster.style.height = '58px';
            let x, y;
            do { x = 50 + Math.random() * (config.containerWidth - 150); y = 80 + Math.random() * (config.containerHeight - 180); } while (Math.hypot(x - state.playerX, y - state.playerY) < 200);
            monster.style.left = x + 'px'; monster.style.top = y + 'px';
            const monsterData = { element: monster, x: x, y: y, hp: config.monsterHP, type: type, dirX: Math.random() > 0.5 ? 1 : -1, dirY: Math.random() > 0.5 ? 1 : -1, moveTimer: 0 };
            
            if (type === 'zombie') {
                monster.innerHTML = `<div class="health-bar"><div class="health-fill" style="width:100%"></div></div><div class="monster-body"><div class="monster-head"><div class="monster-eyes"><div class="monster-eye"></div><div class="monster-eye"></div></div><div class="monster-mouth"><div class="monster-teeth"></div><div class="monster-teeth"></div></div></div><div class="monster-torso"></div><div class="monster-arms"><div class="monster-arm left"></div><div class="monster-arm right"></div></div><div class="monster-legs"><div class="monster-leg"></div><div class="monster-leg"></div></div></div>`;
            } else {
                monster.innerHTML = `<div class="health-bar"><div class="health-fill" style="width:100%"></div></div><div class="monster-body"><div class="monster-head"><div class="monster-eyes"><div class="monster-eye"></div><div class="monster-eye"></div></div><div class="monster-nose"></div><div class="monster-mouth"><div class="monster-teeth"></div><div class="monster-teeth"></div><div class="monster-teeth"></div></div></div><div class="monster-torso"><div class="monster-ribs"></div></div><div class="monster-legs"><div class="monster-leg"></div><div class="monster-leg"></div></div></div>`;
            }
            monster.addEventListener('click', (e) => { e.stopPropagation(); attackMonster(monsterData); });
            container.appendChild(monster);
            state.monsters.push(monsterData);
        }
        
        function attackMonster(monster) { state.currentTarget = monster; state.isAttacking = true; player.classList.add('attacking'); }
        
        let lastAttackTime = 0;
        function processAttack() {
            if (!state.isAttacking || !state.currentTarget) return;
            const now = Date.now();
            if (now - lastAttackTime < config.attackInterval) return;
            const monster = state.currentTarget;
            const dist = Math.hypot(monster.x - state.playerX, monster.y - state.playerY);
            if (dist > config.attackRange) { state.targetX = monster.x + 30; state.targetY = monster.y + 30; state.isMoving = true; return; }
            lastAttackTime = now;
            playHitSound();
            showHitEffect(monster.x + 22, monster.y + 20);
            monster.hp--;
            monster.element.classList.add('hurt');
            setTimeout(() => monster.element.classList.remove('hurt'), 300);
            monster.element.querySelector('.health-fill').style.width = (monster.hp / config.monsterHP) * 100 + '%';
            if (monster.hp <= 0) {
                monster.element.classList.add('dying');
                showScorePopup(monster.x + 22, monster.y);
                setTimeout(() => { monster.element.remove(); const idx = state.monsters.indexOf(monster); if (idx > -1) state.monsters.splice(idx, 1); }, 500);
                state.score++; scoreEl.textContent = state.score;
                state.isAttacking = false; state.currentTarget = null;
                player.classList.remove('attacking');
            }
        }
        
        function showHitEffect(x, y) { const e = document.createElement('div'); e.className = 'hit-effect'; e.textContent = '💥'; e.style.left = x + 'px'; e.style.top = y + 'px'; container.appendChild(e); setTimeout(() => e.remove(), 400); }
        function showScorePopup(x, y) { const p = document.createElement('div'); p.className = 'score-popup'; p.textContent = '+1'; p.style.left = x + 'px'; p.style.top = y + 'px'; container.appendChild(p); setTimeout(() => p.remove(), 1000); }
        
        function updatePlayer() {
            const dx = state.targetX - state.playerX, dy = state.targetY - state.playerY, dist = Math.hypot(dx, dy);
            if (dist > 5) {
                state.isMoving = true;
                state.playerX += (dx / dist) * config.playerSpeed;
                state.playerY += (dy / dist) * config.playerSpeed;
                player.classList.add('walking');
                player.style.transform = dx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
            } else {
                state.isMoving = false;
                player.classList.remove('walking');
            }
            player.style.left = state.playerX + 'px';
            player.style.top = state.playerY + 'px';
        }
        
        function updateMonsters() {
            state.monsters.forEach(monster => {
                monster.moveTimer++;
                if (monster.moveTimer > 30) { monster.moveTimer = 0; if (Math.random() > 0.6) { monster.dirX = Math.random() > 0.5 ? 1 : -1; monster.dirY = Math.random() > 0.5 ? 1 : -1; } }
                monster.x += monster.dirX * config.monsterSpeed;
                monster.y += monster.dirY * config.monsterSpeed;
                if (monster.x < 20 || monster.x > config.containerWidth - 70) { monster.dirX *= -1; monster.x = Math.max(20, Math.min(config.containerWidth - 70, monster.x)); }
                if (monster.y < 60 || monster.y > config.containerHeight - 80) { monster.dirY *= -1; monster.y = Math.max(60, Math.min(config.containerHeight - 80, monster.y)); }
                monster.element.style.left = monster.x + 'px';
                monster.element.style.top = monster.y + 'px';
            });
        }
        
        function gameLoop() { updatePlayer(); updateMonsters(); processAttack(); requestAnimationFrame(gameLoop); }
        
        container.addEventListener('click', (e) => {
            startMusic();
            if (e.target.closest('.monster')) return;
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left - 25, y = e.clientY - rect.top - 35;
            state.targetX = Math.max(0, Math.min(config.containerWidth - 50, x));
            state.targetY = Math.max(50, Math.min(config.containerHeight - 70, y));
            state.isMoving = true;
            state.isAttacking = false; state.currentTarget = null;
            player.classList.remove('attacking');
        });
        
        function createGrassTufts() {
            for (let i = 0; i < 30; i++) {
                const tuft = document.createElement('div');
                tuft.className = 'grass-tuft';
                tuft.textContent = ['🌿', '🍃', '🌱'][Math.floor(Math.random() * 3)];
                tuft.style.left = (Math.random() * 850) + 'px';
                tuft.style.top = (Math.random() * 600) + 'px';
                tuft.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(tuft);
            }
        }
        
        function init() {
            initAudio();
            createGrassTufts();
            state.playerX = 450; state.playerY = 325;
            player.style.left = state.playerX + 'px';
            player.style.top = state.playerY + 'px';
            for (let i = 0; i < config.initialMonsters; i++) setTimeout(() => createMonster(), i * 500);
            setInterval(createMonster, config.spawnInterval);
            gameLoop();
        }
        
        window.onload = init;
    </script>
</body>
</html>
