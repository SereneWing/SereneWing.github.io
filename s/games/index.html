<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏 - SereneWing</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L9 6C8 7 7 8.5 7 10C7 12 8 14 10 15C8 13 7 10 8 7C9 4 11 3 12 3C13 3 15 4 16 7C17 10 16 13 14 15C16 14 17 12 17 10C17 8.5 16 7 15 6L12 2Z' fill='white' stroke='#999' stroke-width='0.5'/></svg>">
    <style>
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 9999px;
            background-color: var(--color-canvas-inset);
            color: var(--color-fg-muted);
        }
        .status-new {
            background-color: #dcfce7;
            color: #15803d;
        }
    </style>
</head>
<body>
    <div class="component-header"></div>

    <main class="main">
        <div class="container">
            <header class="page-header">
                <h1 class="page-title">游戏</h1>
                <p class="page-description">西游记主题的 HTML5 小游戏</p>
            </header>

            <div class="card-grid">
                <a href="./sun-wukong-heaven/" class="card">
                    <div class="card-icon" id="game-sunwukong-icon"></div>
                    <h2 class="card-title">孙悟空大闹天宫</h2>
                    <p class="card-description">
                        孙悟空在南天门前自由飞翔，点击互动触发"哎呀"音效和乾坤圈光标效果。
                    </p>
                    <div class="card-meta">
                        <span class="status-badge status-new">NEW</span>
                    </div>
                </a>

                <a href="./journey-to-heaven/" class="card">
                    <div class="card-icon" id="game-journey-icon"></div>
                    <h2 class="card-title">Journey to Heaven</h2>
                    <p class="card-description">
                        控制孙悟空躲避天兵天将的攻击，穿越天宫到达目的地。
                    </p>
                    <div class="card-meta">
                        <span>经典大闹天宫玩法</span>
                    </div>
                </a>
            </div>

            <section class="mt-3xl">
                <h2 style="font-size: var(--font-xl); margin-bottom: var(--space-lg);">游戏说明</h2>
                <div class="code-block">
                    <p class="text-muted">所有游戏均为纯 HTML5 + JavaScript 开发，无需安装任何插件。</p>
                    <p class="text-muted mt-md">直接在浏览器中打开即可游玩，支持桌面和移动设备。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="component-footer"></footer>
    <script src="../../js/components.js"></script>
    <script>
        SereneWing.initComponents('games');
        document.getElementById('game-sunwukong-icon').innerHTML = SereneWing.icons.card.sunwukong;
        document.getElementById('game-journey-icon').innerHTML = SereneWing.icons.card.journey;
    </script>
</body>
</html>
