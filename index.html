<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SereneWing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #2a2a6e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 48px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 50px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .nav-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 30px 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }
        .nav-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #FFD700;
        }
        .nav-card p {
            font-size: 14px;
            color: #ccc;
        }
        .nav-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        footer {
            margin-top: 50px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 SereneWing</h1>
        <p class="subtitle">AI-assisted personal projects</p>
        
        <div class="nav-grid">
            <a href="games/journey-to-heaven/" class="nav-card">
                <div class="nav-icon">🐵</div>
                <h2>Journey to Heaven</h2>
                <p>大闹天宫 - A Journey to the West themed mini-game</p>
            </a>
            
            <!-- Future modules can be added here -->
            <!--
            <a href="blogs/" class="nav-card">
                <div class="nav-icon">📝</div>
                <h2>Blogs</h2>
                <p>Articles and thoughts</p>
            </a>
            
            <a href="tools/" class="nav-card">
                <div class="nav-icon">🛠️</div>
                <h2>Tools</h2>
                <p>Useful utilities</p>
            </a>
            -->
        </div>
        
        <footer>
            <p>Built with AI assistance | <a href="AI_GUIDE.md" style="color: #FFD700;">AI_GUIDE.md</a></p>
        </footer>
    </div>
</body>
</html>
