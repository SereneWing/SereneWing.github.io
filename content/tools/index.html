<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线工具 - AI编码项目</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="../../" class="site-logo">
                <span>⚡</span>
                <span>AI编码项目</span>
            </a>
            <nav class="nav">
                <a href="../../content/games/" class="nav-link">
                    <span class="nav-icon">🎮</span>
                    <span>游戏</span>
                </a>
                <a href="../../content/blog/" class="nav-link">
                    <span class="nav-icon">📝</span>
                    <span>博客</span>
                </a>
                <a href="./" class="nav-link active">
                    <span class="nav-icon">🔧</span>
                    <span>工具</span>
                </a>
                <a href="../../content/wiki/" class="nav-link">
                    <span class="nav-icon">📖</span>
                    <span>百科</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <header class="page-header">
                <h1 class="page-title">在线工具</h1>
                <p class="page-description">实用的在线开发工具，帮助提高开发效率</p>
            </header>

            <div class="card-grid">
                <a href="./json-formatter/" class="card">
                    <div class="card-icon">📋</div>
                    <h2 class="card-title">JSON格式化</h2>
                    <p class="card-description">JSON解析、验证、格式化和压缩工具。支持语法高亮和错误提示。</p>
                    <div class="card-meta">
                        <span class="status-badge status-active">开发中</span>
                    </div>
                </a>

                <a href="./encoder/" class="card">
                    <div class="card-icon">🔐</div>
                    <h2 class="card-title">编解码器</h2>
                    <p class="card-description">Base64、URL编码等多种编码格式的转换工具。</p>
                    <div class="card-meta">
                        <span class="status-badge status-active">开发中</span>
                    </div>
                </a>

                <a href="#" class="card" style="opacity: 0.6; cursor: not-allowed;">
                    <div class="card-icon">🎨</div>
                    <h2 class="card-title">代码格式化</h2>
                    <p class="card-description">代码美化与格式化工具，支持多种语言。</p>
                    <div class="card-meta">
                        <span class="status-badge">计划中</span>
                    </div>
                </a>

                <a href="#" class="card" style="opacity: 0.6; cursor: not-allowed;">
                    <div class="card-icon">📝</div>
                    <h2 class="card-title">正则测试器</h2>
                    <p class="card-description">正则表达式在线测试与调试工具。</p>
                    <div class="card-meta">
                        <span class="status-badge">计划中</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>
                <a href="../../">AI编码项目</a> · 
                由 <a href="https://github.com/SereneWing" target="_blank">SereneWing</a> 构建
            </p>
        </div>
    </footer>

    <style>
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 9999px;
            background-color: var(--color-canvas-inset);
            color: var(--color-fg-muted);
        }
        .status-active {
            background-color: var(--color-accent-muted);
            color: var(--color-accent-fg);
        }
    </style>
</body>
</html>
