<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西游记游戏集 - 西游主题互动游戏</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐒</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2a1a4e 50%, #3a2a6e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 42px;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 40px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }
        .nav-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 35px 25px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.35);
            background: rgba(255, 255, 255, 0.12);
            border-color: #FFA500;
        }
        .nav-card h2 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #FFD700;
        }
        .nav-card p {
            font-size: 14px;
            color: #bbb;
            line-height: 1.6;
        }
        .nav-icon {
            font-size: 56px;
            margin-bottom: 18px;
        }
        .new-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b6b 0%, #e55a2b 100%);
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            margin-left: 8px;
            vertical-align: middle;
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            font-size: 12px;
            color: #666;
        }
        footer a { color: #FFD700; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐒 西游记游戏集</h1>
        <p class="subtitle">大闹天宫 - 经典名著改编互动游戏</p>
        
        <div class="nav-grid">
            <a href="games/sun-wukong-heaven/" class="nav-card">
                <div class="nav-icon">🐒</div>
                <h2>孙悟空大闹天宫 <span class="new-badge">NEW</span></h2>
                <p>孙悟空在南天门前飞翔，点击互动触发"哎呀"音效和乾坤圈光标</p>
            </a>
            
            <a href="games/journey-to-heaven/" class="nav-card">
                <div class="nav-icon">🏯</div>
                <h2>Journey to Heaven</h2>
                <p>经典大闹天宫游戏，控制孙悟空躲避天兵天将的攻击到达天宫</p>
            </a>
        </div>
        
        <footer>
            <p>Built with AI assistance | <a href="AI_GUIDE.md">AI_GUIDE.md</a></p>
        </footer>
    </div>
</body>
</html>
